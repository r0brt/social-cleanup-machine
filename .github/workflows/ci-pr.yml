name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      contract: ${{ steps.filter.outputs.contract }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        shell: bash
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          echo "Changed files:"
          echo "$changed_files"

          has_match() {
            local pattern="$1"
            if echo "$changed_files" | grep -Eq "$pattern"; then
              echo "true"
            else
              echo "false"
            fi
          }

          echo "backend=$(has_match '^(backend/|alembic/|alembic\.ini$|pyproject\.toml$|uv\.lock$|tests/)')" >> "$GITHUB_OUTPUT"
          echo "frontend=$(has_match '^(frontend/|package\.json$|package-lock\.json$|tsconfig.*\.json$|vite\.config\.)')" >> "$GITHUB_OUTPUT"
          echo "contract=$(has_match '^(schemas/|api/|backend/(api|application|domain|infrastructure)/|tests/contracts/|alembic/|alembic\.ini$)')" >> "$GITHUB_OUTPUT"

  backend-lint-type-test:
    name: backend-lint-type-test
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install uv
        shell: bash
        run: python -m pip install --upgrade pip uv

      - name: Lint, type check, and test
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f pyproject.toml ]; then
            echo "No pyproject.toml found. Skipping backend checks."
            exit 0
          fi

          set -o pipefail
          uv sync 2>&1 | tee backend-uv-sync.log
          uv run ruff check . 2>&1 | tee backend-ruff.log
          uv run pytest -q --junitxml=pytest-report.xml 2>&1 | tee backend-pytest.log
          if [ -f mypy.ini ] || [ -f .mypy.ini ] || grep -q '^\[tool\.mypy\]' pyproject.toml; then
            uv run mypy . 2>&1 | tee backend-mypy.log
          else
            echo "mypy not configured. Skipping." | tee backend-mypy.log
          fi

      - name: Upload backend artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-job-artifacts
          path: |
            backend-*.log
            pytest-report.xml
          if-no-files-found: ignore

  frontend-test-build:
    name: frontend-test-build
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Test and build frontend
        shell: bash
        run: |
          set -euo pipefail
          if [ -f frontend/package.json ]; then
            project_dir="frontend"
          elif [ -f package.json ]; then
            project_dir="."
          else
            echo "No package.json found. Skipping frontend checks."
            exit 0
          fi

          set -o pipefail
          if [ "$project_dir" = "." ]; then
            npm ci 2>&1 | tee frontend-npm-ci.log
            npm run test -- --run 2>&1 | tee frontend-test.log
            npm run build 2>&1 | tee frontend-build.log
          else
            npm --prefix "$project_dir" ci 2>&1 | tee frontend-npm-ci.log
            npm --prefix "$project_dir" run test -- --run 2>&1 | tee frontend-test.log
            npm --prefix "$project_dir" run build 2>&1 | tee frontend-build.log
          fi

      - name: Upload frontend artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-job-artifacts
          path: |
            frontend-*.log
          if-no-files-found: ignore

  contract-and-migrations:
    name: contract-and-migrations
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.contract == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.cache/pip
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install uv
        shell: bash
        run: python -m pip install --upgrade pip uv

      - name: Validate contracts and migrations
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f pyproject.toml ]; then
            echo "No pyproject.toml found. Skipping contract/migration checks."
            exit 0
          fi

          set -o pipefail
          uv sync 2>&1 | tee contract-uv-sync.log

          if [ -d tests/contracts ]; then
            uv run pytest -q tests/contracts 2>&1 | tee contract-tests.log
          else
            echo "Contract-related files changed, but tests/contracts is missing."
            exit 1
          fi

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_files="$(git diff --name-only "$base_sha" "$head_sha")"

          schema_pattern='^(backend/.*/models/|backend/.*/models\.py$|backend/infrastructure/(db|persistence)/|schemas/)'
          migration_pattern='^alembic/versions/.*\.py$'
          if echo "$changed_files" | grep -Eq "$schema_pattern"; then
            if ! echo "$changed_files" | grep -Eq "$migration_pattern"; then
              echo "Schema-related files changed without an Alembic migration under alembic/versions/."
              exit 1
            fi
          fi

          if [ -f alembic.ini ] && [ -d alembic ]; then
            uv run alembic upgrade head 2>&1 | tee contract-alembic.log
          else
            echo "Alembic not configured. Skipping alembic upgrade check." | tee contract-alembic.log
          fi

      - name: Upload contract artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-job-artifacts
          path: |
            contract-*.log
          if-no-files-found: ignore

  pr-title-conventional:
    name: pr-title-conventional
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title against Conventional Commits
        shell: bash
        run: |
          set -euo pipefail
          title="${{ github.event.pull_request.title }}"
          regex='^(feat|fix|docs|refactor|test|chore)(\([^)]+\))?(!)?: .+'
          if [[ ! "$title" =~ $regex ]]; then
            echo "PR title must follow Conventional Commits (e.g., feat(ci): add workflow)."
            echo "Current title: $title"
            exit 1
          fi

  pr-size-guardrail:
    name: pr-size-guardrail
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce large PR acknowledgment
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          changed_lines="$(
            git diff --numstat "$base_sha" "$head_sha" \
              | awk '
                  $3 !~ /(^|\/)(package-lock\.json|uv\.lock)$/ {
                    if ($1 ~ /^[0-9]+$/) add += $1
                    if ($2 ~ /^[0-9]+$/) del += $2
                  }
                  END { print add + del + 0 }
                '
          )"

          echo "Changed non-lockfile lines: $changed_lines"
          if [ "$changed_lines" -gt 400 ]; then
            if ! echo "$PR_BODY" | grep -Eq '^Large-PR-Risk-Ack:[[:space:]].+'; then
              echo "PR exceeds 400 changed lines. Add Large-PR-Risk-Ack in the PR template."
              exit 1
            fi
          fi
